<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#111111"/>
  <!-- Connection lines -->
  <line x1="32" y1="32" x2="16" y2="16" stroke="#e53e3e" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="32" y1="32" x2="48" y2="16" stroke="#e53e3e" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="32" y1="32" x2="16" y2="48" stroke="#e53e3e" stroke-width="2.5" stroke-opacity="0.5"/>
  <line x1="32" y1="32" x2="48" y2="48" stroke="#e53e3e" stroke-width="2.5" stroke-opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="16" r="5" fill="#e53e3e"/>
  <circle cx="48" cy="16" r="5" fill="#e53e3e"/>
  <circle cx="16" cy="48" r="5" fill="#e53e3e"/>
  <circle cx="48" cy="48" r="5" fill="#e53e3e"/>
  <!-- Center hub node -->
  <circle cx="32" cy="32" r="8" fill="#e53e3e"/>
  <circle cx="32" cy="32" r="4" fill="#111111"/>
  <!-- Subtle glow on center -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#e53e3e" stroke-width="1" stroke-opacity="0.3"/>
</svg>
